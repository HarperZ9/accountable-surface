<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Watching · The Shared World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Schibsted+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a1314; --void-2:#0e1c1d; --bone:#e9e2d0; --orange:#df5e00; --ember:#efab30;
    --prussian:#476762; --muted:#8a9b92; --hairline:rgba(239,171,48,.14);
    --verified:#7fcf9b; --refuted:#df5e00; --unverifiable:#8a9b92; --needs-human:#efab30; --live:#ff4d4d;
    --serif:"EB Garamond",Georgia,serif; --disp:"Schibsted Grotesk",system-ui,sans-serif;
    --mono:"Spline Sans Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:radial-gradient(130% 100% at 50% -20%,var(--void-2),var(--void) 65%);
    color:var(--bone);font-family:var(--serif);-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;height:100vh;overflow:hidden}

  header.bar{display:flex;align-items:center;gap:1rem;padding:.8rem clamp(1rem,3vw,2.2rem);
    border-bottom:1px solid var(--hairline);background:rgba(10,19,20,.6)}
  .live{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--mono);font-size:.66rem;
    letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
  .live .dot{width:9px;height:9px;border-radius:50%;background:var(--muted)}
  .live.on{color:var(--live)} .live.on .dot{background:var(--live);box-shadow:0 0 0 0 rgba(255,77,77,.6);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,77,77,.55)}70%{box-shadow:0 0 0 9px rgba(255,77,77,0)}100%{box-shadow:0 0 0 0 rgba(255,77,77,0)}}
  .title{font-family:var(--disp);font-weight:600;font-size:.95rem;letter-spacing:.01em}
  .now{flex:1;font-family:var(--mono);font-size:.66rem;color:var(--ember);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .now b{color:var(--muted);font-weight:400}
  .pilot{font-family:var(--mono);font-size:.6rem;color:var(--prussian)}

  main{flex:1;display:grid;grid-template-columns:1.7fr 1fr;gap:0;min-height:0}
  .stage{display:flex;flex-direction:column;min-height:0;border-right:1px solid var(--hairline);padding:clamp(1rem,2.4vw,2.2rem)}
  .stage .cap{font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--prussian);margin-bottom:.7rem}
  .stage .cap b{color:var(--ember);font-weight:500}
  .screen{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:auto;
    border:1px solid var(--hairline);border-radius:12px;background:rgba(0,0,0,.32);padding:1.2rem}
  pre.sight{font-family:var(--mono);margin:0;line-height:1.02;letter-spacing:.02em;color:var(--ember);
    text-shadow:0 0 16px rgba(239,171,48,.3);white-space:pre;font-size:clamp(8px,1.5vw,20px)}
  pre.text{font-family:var(--mono);margin:0;color:var(--bone);white-space:pre-wrap;word-break:break-word;
    font-size:.78rem;line-height:1.6;align-self:stretch}
  .empty{color:var(--muted);font-style:italic;font-family:var(--serif)}
  .sightmeta{font-family:var(--mono);font-size:.55rem;color:var(--muted);margin-top:.7rem;text-align:center}

  aside{display:flex;flex-direction:column;min-height:0}
  .feed{flex:1;min-height:0;display:flex;flex-direction:column}
  .feed h2{font-family:var(--mono);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--prussian);margin:0;padding:.9rem clamp(.9rem,1.8vw,1.4rem) .5rem}
  .voice{flex:1.4;min-height:0;overflow:auto;padding:0 clamp(.9rem,1.8vw,1.4rem) .6rem}
  .vline{font-family:var(--serif);font-size:.95rem;color:#dcd4c0;padding:.55rem 0;border-bottom:1px dotted rgba(138,155,146,.13);animation:rise .4s ease}
  .vline .who{font-family:var(--mono);font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--prussian);display:block;margin-bottom:.18rem}
  .vline em{color:var(--muted);font-size:.82rem}
  @keyframes rise{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .ticker{flex:1;min-height:0;overflow:auto;border-top:1px solid var(--hairline);padding:.5rem clamp(.9rem,1.8vw,1.4rem)}
  .tick{display:grid;grid-template-columns:auto 1fr auto;gap:.5rem;align-items:center;font-family:var(--mono);font-size:.58rem;color:var(--muted);padding:.26rem 0;border-bottom:1px dotted rgba(138,155,146,.1)}
  .tick .gate{font-size:.5rem;letter-spacing:.08em}
  .tag{display:inline-block;font-family:var(--mono);font-size:.55rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:.12em .5em;border-radius:999px;border:1px solid currentColor}
  .tag.verified{color:var(--verified)} .tag.refuted{color:var(--refuted)} .tag.unverifiable{color:var(--unverifiable)} .tag.needs-human{color:var(--needs-human)}
  .tag.allow{color:var(--verified)} .tag.deny{color:var(--refuted)}

  footer{font-family:var(--mono);font-size:.54rem;color:var(--muted);text-align:center;padding:.5rem;border-top:1px solid var(--hairline)}
  footer a{color:var(--prussian)}
  @media (max-width:820px){main{grid-template-columns:1fr;grid-template-rows:1.3fr 1fr}.stage{border-right:none;border-bottom:1px solid var(--hairline)}}
</style>
</head>
<body>
  <header class="bar">
    <span class="live" id="live"><span class="dot"></span><span id="live-label">connecting</span></span>
    <span class="title">The Shared World</span>
    <span class="now" id="now"><b>idle</b></span>
    <span class="pilot">pilot: <span id="pilot">…</span></span>
  </header>

  <main>
    <section class="stage">
      <div class="cap" id="stage-cap">the stage &middot; <b>what the model sees</b></div>
      <div class="screen" id="screen"><span class="empty">waiting for the world…</span></div>
      <div class="sightmeta" id="sightmeta"></div>
    </section>

    <aside>
      <div class="feed">
        <h2>the mind &middot; its own voice</h2>
        <div class="voice" id="voice"></div>
        <h2>activity &middot; every move, gated &amp; witnessed</h2>
        <div class="ticker" id="ticker"></div>
      </div>
    </aside>
  </main>

  <footer>you are watching a model and an operator share one accountable world &middot; every move is re-checkable &middot; <a href="/">open the operator view</a></footer>

<script type="module" src="./watch.js"></script>
</body>
</html>
